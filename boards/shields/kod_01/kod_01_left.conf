# ZMK Studio設定
CONFIG_ZMK_STUDIO_LOCKING=n

# Bluetooth設定
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_GATT_DIS_PNP=y
CONFIG_BT_GATT_DIS_SERIAL_NUMBER=y
CONFIG_BT_GATT_DIS_FW_REV=y
CONFIG_BT_GATT_DIS_HW_REV=y
CONFIG_BT_GATT_DIS_SW_REV=y

